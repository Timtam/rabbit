name: Set up macOS signing
description: >-
  Import a Developer ID Application certificate into an ephemeral keychain and
  stage the App Store Connect API key for notarytool. Exports the signing
  identity and notary credentials to the job environment as
  RABBIT_MAC_SIGN_IDENTITY / RABBIT_NOTARY_KEY / RABBIT_NOTARY_KEY_ID /
  RABBIT_NOTARY_ISSUER so later steps can sign and notarize. macOS only.

inputs:
  certificate-base64:
    description: Base64-encoded Developer ID Application certificate (.p12).
    required: true
  certificate-password:
    description: Password protecting the .p12.
    required: true
  signing-identity:
    description: 'codesign identity, e.g. "Developer ID Application: Name (TEAMID)".'
    required: true
  notary-key-base64:
    description: Base64-encoded App Store Connect API key (.p8).
    required: true
  notary-key-id:
    description: App Store Connect API Key ID.
    required: true
  notary-issuer-id:
    description: App Store Connect API Issuer ID.
    required: true

runs:
  using: composite
  steps:
    - name: Import certificate and stage notary key
      shell: bash
      env:
        CERT_B64: ${{ inputs.certificate-base64 }}
        CERT_PWD: ${{ inputs.certificate-password }}
        SIGN_IDENTITY: ${{ inputs.signing-identity }}
        NOTARY_KEY_B64: ${{ inputs.notary-key-base64 }}
        NOTARY_KEY_ID: ${{ inputs.notary-key-id }}
        NOTARY_ISSUER_ID: ${{ inputs.notary-issuer-id }}
      run: |
        set -euo pipefail

        KEYCHAIN="$RUNNER_TEMP/rabbit-signing.keychain-db"
        KEYCHAIN_PWD="$(uuidgen)"
        CERT_PATH="$RUNNER_TEMP/rabbit-cert.p12"
        NOTARY_KEY_PATH="$RUNNER_TEMP/rabbit-notary.p8"

        # Materialize the secrets onto the runner from their base64 form.
        echo "$CERT_B64" | base64 --decode > "$CERT_PATH"
        echo "$NOTARY_KEY_B64" | base64 --decode > "$NOTARY_KEY_PATH"

        # Create an ephemeral keychain just for this job and import the
        # Developer ID cert + private key into it. GitHub-hosted runners are
        # destroyed after the job, so there's no cleanup step to write.
        security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
        # Disable the relock timeout (-l) and set a long lock-on-idle (-u/-t)
        # so the key stays usable for the whole job, including a slow notarize.
        security set-keychain-settings -lut 21600 "$KEYCHAIN"
        security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
        security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PWD" \
          -T /usr/bin/codesign -T /usr/bin/security
        # Authorize codesign to use the imported key non-interactively.
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
        # Prepend our keychain to the user search list so codesign resolves the
        # identity; keep the existing keychains (e.g. login) after it.
        security list-keychains -d user -s "$KEYCHAIN" \
          $(security list-keychains -d user | sed -e 's/"//g')
        rm -f "$CERT_PATH"

        # Hand the signing identity and notary credentials to subsequent steps.
        # The .p8 stays on disk in RUNNER_TEMP for the job's lifetime; we pass
        # its path, not its bytes.
        {
          echo "RABBIT_MAC_SIGN_IDENTITY=$SIGN_IDENTITY"
          echo "RABBIT_NOTARY_KEY=$NOTARY_KEY_PATH"
          echo "RABBIT_NOTARY_KEY_ID=$NOTARY_KEY_ID"
          echo "RABBIT_NOTARY_ISSUER=$NOTARY_ISSUER_ID"
        } >> "$GITHUB_ENV"
